<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knight Trial Log</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1b1b1b);
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    font-family: 'Cinzel', serif;
    font-size: 32px;
    background: linear-gradient(90deg, #8b0000, #b22222);
    letter-spacing: 2px;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

form {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(178,34,34,0.4);
    margin-bottom: 30px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

input, select {
    background: #2a2a2a;
    color: white;
}

button {
    background: crimson;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e1e1e;
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #2a2a2a;
}

tr:nth-child(even) {
    background: #252525;
}

.passed { color: #4CAF50; font-weight: bold; }
.failed { color: orange; font-weight: bold; }
.cheated { color: red; font-weight: bold; }

.copyBtn {
    background: #3f51b5;
}

.copyBtn:hover {
    background: #283593;
}
</style>
</head>
<body>

<header>⚔ Knight Trial Log ⚔</header>

<div class="container">

<form id="trialForm">
    <input type="text" id="host" placeholder="Host" required>
    <input type="text" id="attendee" placeholder="Attendee" required>

    <select id="result" required>
        <option value="">Select Result</option>
        <option value="Passed">Passed</option>
        <option value="Failed">Failed</option>
        <option value="Cheated">Cheated</option>
    </select>

    <input type="url" id="document" placeholder="Assessment Link (https://...)" required>

    <button type="submit">Add Trial</button>
</form>

<table>
<thead>
<tr>
    <th>Host</th>
    <th>Attendee</th>
    <th>Result</th>
    <th>Date</th>
    <th>Ping</th>
    <th>Copy</th>
</tr>
</thead>
<tbody id="logTable"></tbody>
</table>

</div>

<script>
const form = document.getElementById("trialForm");
const table = document.getElementById("logTable");
const PING_ID = "<@&1468821245972713585>";

function getTodayDate() {
    return new Date().toISOString().split("T")[0];
}

function addRow(log) {
    const row = document.createElement("tr");

    let resultClass = "";
    let resultText = log.result;

    if (log.result === "Passed") resultClass = "passed";
    if (log.result === "Failed") resultClass = "failed";
    if (log.result === "Cheated") {
        resultClass = "cheated";
        resultText += " (8 day cd)";
    }

    const discordMessage =
`⚔ Knight Trial Log ⚔
Host: ${log.host}
Attendee: ${log.attendee}
Result: ${resultText}
Date: ${log.date}
Ping: ${PING_ID}
Assessment link: ${log.document}`;

    row.innerHTML = `
        <td>${log.host}</td>
        <td>${log.attendee}</td>
        <td class="${resultClass}">${resultText}</td>
        <td>${log.date}</td>
        <td>${PING_ID}</td>
        <td><button class="copyBtn">Copy</button></td>
    `;

    row.querySelector(".copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(discordMessage);
        row.querySelector(".copyBtn").innerText = "Copied ✓";
        setTimeout(() => {
            row.querySelector(".copyBtn").innerText = "Copy";
        }, 2000);
    });

    table.appendChild(row);
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const log = {
        host: host.value,
        attendee: attendee.value,
        result: result.value,
        date: getTodayDate(),
        document: document.value
    };

    addRow(log);
    form.reset();
});
</script>

</body>
</html>
