<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knight Trial Log</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0f0f0f, #1b1b1b);
        color: white;
    }

    header {
        text-align: center;
        padding: 30px;
        font-family: 'Cinzel', serif;
        font-size: 32px;
        background: linear-gradient(90deg, #8b0000, #b22222);
        letter-spacing: 2px;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
    }

    form {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(178,34,34,0.4);
        margin-bottom: 30px;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        font-size: 14px;
    }

    input, select {
        background: #2a2a2a;
        color: white;
    }

    button {
        background: #b22222;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #8b0000;
        transform: scale(1.03);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #1e1e1e;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(178,34,34,0.3);
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: #2a2a2a;
        font-weight: 600;
    }

    tr:nth-child(even) {
        background: #252525;
    }

    .passed {
        color: #4CAF50;
        font-weight: bold;
    }

    .failed {
        color: #ff9800;
        font-weight: bold;
    }

    .cheated {
        color: #f44336;
        font-weight: bold;
    }

    a {
        color: #4fc3f7;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        opacity: 0.6;
    }
</style>
</head>
<body>

<header>⚔ Knight Trial Log ⚔</header>

<div class="container">

<form id="trialForm">
    <input type="text" id="host" placeholder="Host" required>
    <input type="text" id="attendee" placeholder="Attendee" required>

    <select id="result" required>
        <option value="">Select Result</option>
        <option value="Passed">Passed</option>
        <option value="Failed">Failed</option>
        <option value="Cheated">Cheated</option>
    </select>

    <input type="text" id="document" placeholder="Document Link" required>

    <button type="submit">Add Trial</button>
</form>

<table>
    <thead>
        <tr>
            <th>Host</th>
            <th>Attendee</th>
            <th>Result</th>
            <th>Date</th>
            <th>Ping</th>
            <th>Document</th>
        </tr>
    </thead>
    <tbody id="logTable"></tbody>
</table>

</div>

<footer>
    Ping ID: &lt;@&1468821245972713585&gt;
</footer>

<script>
const form = document.getElementById("trialForm");
const table = document.getElementById("logTable");

const PING_ID = "<@&1468821245972713585>";

function getTodayDate() {
    const today = new Date();
    return today.toISOString().split("T")[0];
}

function loadLogs() {
    const logs = JSON.parse(localStorage.getItem("trialLogs")) || [];
    logs.forEach(addRow);
}

function saveLog(log) {
    const logs = JSON.parse(localStorage.getItem("trialLogs")) || [];
    logs.push(log);
    localStorage.setItem("trialLogs", JSON.stringify(logs));
}

function addRow(log) {
    const row = document.createElement("tr");

    let resultClass = "";
    let resultText = log.result;

    if (log.result === "Passed") resultClass = "passed";
    if (log.result === "Failed") resultClass = "failed";
    if (log.result === "Cheated") {
        resultClass = "cheated";
        resultText += " (8 day cd)";
    }

    row.innerHTML = `
        <td>${log.host}</td>
        <td>${log.attendee}</td>
        <td class="${resultClass}">${resultText}</td>
        <td>${log.date}</td>
        <td>${PING_ID}</td>
        <td><a href="${log.document}" target="_blank">View</a></td>
    `;

    table.appendChild(row);
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const log = {
        host: host.value,
        attendee: attendee.value,
        result: result.value,
        date: getTodayDate(),
        document: document.value
    };

    addRow(log);
    saveLog(log);
    form.reset();
});

loadLogs();
</script>

</body>
</html>
