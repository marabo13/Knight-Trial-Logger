<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knight Trial Log</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0b1a2f, #000814);
    color: #e0f7ff;
}

header {
    text-align: center;
    padding: 40px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: #00e5ff;
    text-shadow: 0 0 20px #00e5ff, 0 0 40px #00bcd4;
}

.container {
    max-width: 950px;
    margin: 40px auto;
    padding: 20px;
}

form {
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0,229,255,0.2);
    margin-bottom: 30px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

input, select {
    background: #001d3d;
    color: #e0f7ff;
    border: 1px solid rgba(0,229,255,0.3);
}

button {
    background: #00e5ff;
    color: #000814;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #00e5ff;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #00e5ff;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: rgba(0,229,255,0.1);
    font-family: 'Orbitron', sans-serif;
}

tr:nth-child(even) {
    background: rgba(0,229,255,0.03);
}

.passed {
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88;
    font-weight: bold;
}

.failed {
    color: #ffcc00;
    text-shadow: 0 0 8px #ffcc00;
    font-weight: bold;
}

.cheated {
    color: #ff2a2a;
    text-shadow: 0 0 10px #ff2a2a;
    font-weight: bold;
}

.copyBtn {
    background: transparent;
    border: 1px solid #00e5ff;
    color: #00e5ff;
}

.copyBtn:hover {
    background: #00e5ff;
    color: #000814;
}
</style>
</head>
<body>

<header>🌌 Knight Trial Log 🌌</header>

<div class="container">

<form id="trialForm">
    <select id="host" required>
        <option value="">Select Host</option>
        <option value="veils_s">veils_s</option>
        <option value="StormThyGoat">StormThyGoat</option>
        <option value="nyiko46">nyiko46</option>
        <option value="axronomore">axronomore</option>
        <option value="jaketstone34">jaketstone34</option>
        <option value="marabo13">marabo13</option>
        <option value="Insettopallena">Insettopallena</option>
        <option value="majin_jedi">majin_jedi</option>
        <option value="6Talker9">6Talker9</option>
        <option value="YepImDivine">YepImDivine</option>
        <option value="SpanishBigMuscle">SpanishBigMuscle</option>
        <option value="Demxcles">Demxcles</option>
        <option value="ValoBelmont">ValoBelmont</option>
        <option value="Pakaold1">Pakaold1</option>
    </select>

    <input type="text" id="attendee" placeholder="Attendee" required>

    <select id="result" required>
        <option value="">Select Result</option>
        <option value="Passed">Passed</option>
        <option value="Failed">Failed</option>
        <option value="Cheated">Cheated</option>
    </select>

    <input type="url" id="document" placeholder="Assessment Link (https://...)" required>

    <button type="submit">Record Trial</button>
</form>

<table>
<thead>
<tr>
    <th>Host</th>
    <th>Attendee</th>
    <th>Result</th>
    <th>Date</th>
    <th>Ping</th>
    <th>Copy</th>
</tr>
</thead>
<tbody id="logTable"></tbody>
</table>

</div>

<script>
const form = document.getElementById("trialForm");
const table = document.getElementById("logTable");
const PING_ID = "<@&1468821245972713585>";

function getTodayDate() {
    return new Date().toISOString().split("T")[0];
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const hostValue = document.getElementById("host").value;
    const attendeeValue = document.getElementById("attendee").value;
    const resultValue = document.getElementById("result").value;
    const documentValue = document.getElementById("document").value;

    let resultText = resultValue;
    let resultClass = "";

    if (resultValue === "Passed") resultClass = "passed";
    if (resultValue === "Failed") resultClass = "failed";
    if (resultValue === "Cheated") {
        resultClass = "cheated";
        resultText += " (8 day cd)";
    }

    const dateToday = getTodayDate();

    const discordMessage =
`🌌 Knight Trial Log
Host: ${hostValue}
Attendee: ${attendeeValue}
Result: ${resultText}
Date: ${dateToday}
Ping: ${PING_ID}
Assessment link: ${documentValue}`;

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${hostValue}</td>
        <td>${attendeeValue}</td>
        <td class="${resultClass}">${resultText}</td>
        <td>${dateToday}</td>
        <td>${PING_ID}</td>
        <td><button class="copyBtn">Copy</button></td>
    `;

    row.querySelector(".copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(discordMessage);
        row.querySelector(".copyBtn").innerText = "Copied ✓";
        setTimeout(() => {
            row.querySelector(".copyBtn").innerText = "Copy";
        }, 2000);
    });

    table.appendChild(row);
    form.reset();
});
</script>

</body>
</html>
