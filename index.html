<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jedi Trial Log</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0a0f1c, #000);
    color: #00eaff;
}

header {
    text-align: center;
    padding: 30px;
    font-size: 32px;
    letter-spacing: 3px;
    background: black;
    border-bottom: 2px solid #00eaff;
    text-shadow: 0 0 15px #00eaff;
}

.container {
    max-width: 950px;
    margin: 40px auto;
    padding: 20px;
}

form {
    background: rgba(0, 0, 0, 0.8);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid #00eaff;
    box-shadow: 0 0 25px #00eaff;
    margin-bottom: 30px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #00eaff;
    background: black;
    color: #00eaff;
    font-family: 'Orbitron', sans-serif;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    font-family: 'Orbitron', sans-serif;
    cursor: pointer;
    font-weight: bold;
}

.addBtn {
    background: #00eaff;
    color: black;
    box-shadow: 0 0 15px #00eaff;
}

.addBtn:hover {
    background: #00bcd4;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid #00eaff;
    box-shadow: 0 0 25px #00eaff;
}

th, td {
    padding: 14px;
    text-align: center;
    border-bottom: 1px solid #003b44;
}

th {
    background: black;
    text-shadow: 0 0 10px #00eaff;
}

tr:hover {
    background: rgba(0, 234, 255, 0.1);
}

.passed {
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
}

.failed {
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00;
}

.cheated {
    color: #ff0033;
    text-shadow: 0 0 12px #ff0033;
}

.copyBtn {
    background: #111;
    border: 1px solid #00eaff;
    color: #00eaff;
    box-shadow: 0 0 10px #00eaff;
}

.copyBtn:hover {
    background: #00eaff;
    color: black;
}

footer {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
    font-size: 12px;
}

</style>
</head>
<body>

<header>🌌 JEDI TRIAL LOG 🌌</header>

<div class="container">

<form id="trialForm">
    <input type="text" id="host" placeholder="Jedi Master (Host)" required>
    <input type="text" id="attendee" placeholder="Padawan (Attendee)" required>

    <select id="result" required>
        <option value="">Select Outcome</option>
        <option value="Passed">Passed</option>
        <option value="Failed">Failed</option>
        <option value="Cheated">Cheated</option>
    </select>

    <input type="text" id="document" placeholder="Holocron Document Link" required>

    <button type="submit" class="addBtn">Record Trial</button>
</form>

<table>
<thead>
<tr>
    <th>Master</th>
    <th>Padawan</th>
    <th>Outcome</th>
    <th>Date</th>
    <th>Ping</th>
    <th>Copy</th>
</tr>
</thead>
<tbody id="logTable"></tbody>
</table>

</div>

<footer>
Ping ID: &lt;@&1468821245972713585&gt;
</footer>

<script>
const form = document.getElementById("trialForm");
const table = document.getElementById("logTable");
const PING_ID = "<@&1468821245972713585>";

function getTodayDate() {
    return new Date().toISOString().split("T")[0];
}

function addRow(log) {
    const row = document.createElement("tr");

    let resultClass = "";
    let resultText = log.result;

    if (log.result === "Passed") resultClass = "passed";
    if (log.result === "Failed") resultClass = "failed";
    if (log.result === "Cheated") {
        resultClass = "cheated";
        resultText += " (8 day cd)";
    }

    const discordMessage =
`🌌 **JEDI TRIAL LOG** 🌌
Master: ${log.host}
Padawan: ${log.attendee}
Outcome: ${resultText}
Date: ${log.date}
Ping: ${PING_ID}
Holocron: ${log.document}`;

    row.innerHTML = `
        <td>${log.host}</td>
        <td>${log.attendee}</td>
        <td class="${resultClass}">${resultText}</td>
        <td>${log.date}</td>
        <td>${PING_ID}</td>
        <td><button class="copyBtn">Copy</button></td>
    `;

    row.querySelector(".copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(discordMessage);
        row.querySelector(".copyBtn").innerText = "Copied!";
        setTimeout(() => {
            row.querySelector(".copyBtn").innerText = "Copy";
        }, 1500);
    });

    table.appendChild(row);
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const log = {
        host: host.value,
        attendee: attendee.value,
        result: result.value,
        date: getTodayDate(),
        document: document.value
    };

    addRow(log);
    form.reset();
});
</script>

</body>
</html>
