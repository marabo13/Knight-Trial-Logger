<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jedi Trial Log</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0d1b2a, #000814);
    color: #e0f7ff;
}

header {
    text-align: center;
    padding: 30px;
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: #00e5ff;
    text-shadow: 0 0 15px #00e5ff;
    border-bottom: 1px solid rgba(0,229,255,0.3);
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

form {
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0,229,255,0.2);
    margin-bottom: 30px;
    backdrop-filter: blur(8px);
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

input, select {
    background: #001d3d;
    color: #e0f7ff;
    border: 1px solid rgba(0,229,255,0.2);
}

button {
    background: #00e5ff;
    color: #000814;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #00e5ff;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00e5ff;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: rgba(0,229,255,0.1);
    font-family: 'Orbitron', sans-serif;
}

tr:nth-child(even) {
    background: rgba(0,229,255,0.03);
}

.passed {
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88;
    font-weight: bold;
}

.failed {
    color: #ffcc00;
    text-shadow: 0 0 8px #ffcc00;
    font-weight: bold;
}

.cheated {
    color: #ff2a2a;
    text-shadow: 0 0 10px #ff2a2a;
    font-weight: bold;
}

.copyBtn {
    background: transparent;
    border: 1px solid #00e5ff;
    color: #00e5ff;
}

.copyBtn:hover {
    background: #00e5ff;
    color: #000814;
}

footer {
    text-align: center;
    padding: 20px;
    opacity: 0.5;
}
</style>
</head>
<body>

<header>✦ JEDI COUNCIL TRIAL LOG ✦</header>

<div class="container">

<form id="trialForm">
    <input type="text" id="host" placeholder="Jedi Master (Host)" required>
    <input type="text" id="attendee" placeholder="Padawan (Attendee)" required>

    <select id="result" required>
        <option value="">Select Trial Result</option>
        <option value="Passed">Passed</option>
        <option value="Failed">Failed</option>
        <option value="Cheated">Cheated</option>
    </select>

    <input type="text" id="document" placeholder="Holocron Record (Document Link)" required>
    <button type="submit">Record Trial</button>
</form>

<table>
<thead>
<tr>
    <th>Master</th>
    <th>Padawan</th>
    <th>Result</th>
    <th>Date</th>
    <th>Ping</th>
    <th>Transmit</th>
</tr>
</thead>
<tbody id="logTable"></tbody>
</table>

</div>

<footer>
    Jedi Council Ping: &lt;@&1468821245972713585&gt;
</footer>

<script>
const form = document.getElementById("trialForm");
const table = document.getElementById("logTable");
const PING_ID = "<@&1468821245972713585>";

function getTodayDate() {
    return new Date().toISOString().split("T")[0];
}

function addRow(log) {
    const row = document.createElement("tr");

    let resultClass = "";
    let resultText = log.result;

    if (log.result === "Passed") resultClass = "passed";
    if (log.result === "Failed") resultClass = "failed";
    if (log.result === "Cheated") {
        resultClass = "cheated";
        resultText += " (8 day cd)";
    }

    const discordMessage =
`✦ Jedi Council Trial Log ✦
Master: ${log.host}
Padawan: ${log.attendee}
Result: ${resultText}
Date: ${log.date}
Ping: ${PING_ID}
Holocron Record: ${log.document}`;

    row.innerHTML = `
        <td>${log.host}</td>
        <td>${log.attendee}</td>
        <td class="${resultClass}">${resultText}</td>
        <td>${log.date}</td>
        <td>${PING_ID}</td>
        <td><button class="copyBtn">Transmit</button></td>
    `;

    row.querySelector(".copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(discordMessage);
        row.querySelector(".copyBtn").innerText = "Transmitted ✓";
        setTimeout(() => {
            row.querySelector(".copyBtn").innerText = "Transmit";
        }, 2000);
    });

    table.appendChild(row);
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const log = {
        host: host.value,
        attendee: attendee.value,
        result: result.value,
        date: getTodayDate(),
        document: document.value
    };

    addRow(log);
    form.reset();
});
</script>

</body>
</html>
